# ============================================================
# SkillHub — Stack complète (microservices)
# ============================================================
# Réseau interne isolé, health checks sur chaque service,
# limites mem/cpu, redémarrage automatique, secrets via .env.
# ============================================================

services:

  # ─── MySQL — base principale métier ───────────────────────
  mysql:
    image: mysql:8.0
    container_name: skillhub_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-skillhub}
    ports:
      - "3307:3306"
    volumes:
      - skillhub_mysql_data:/var/lib/mysql
    networks:
      - skillhub-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ─── MongoDB — logs activité + messages ───────────────────
  mongodb:
    image: mongo:7.0
    container_name: skillhub_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-skillhub_messages}
    ports:
      - "27017:27017"
    volumes:
      - skillhub_mongo_data:/data/db
    networks:
      - skillhub-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.4"

  # ─── Backend Laravel (API métier + JWT) ───────────────────
  skillhub-back:
    build:
      context: ./skillhub-back
      dockerfile: Dockerfile
    container_name: skillhub_back
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    ports:
      - "8001:8001"
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-true}
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-skillhub}
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DATABASE: ${MONGO_DATABASE:-skillhub_messages}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_MAILER: ${MAIL_MAILER:-log}
    networks:
      - skillhub-net
    healthcheck:
      # Laravel expose une route /up pour les health checks (depuis Laravel 11).
      test: ["CMD-SHELL", "php -r 'exit(@file_get_contents(\"http://localhost:8001/up\") === false ? 1 : 0);'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.6"

  # ─── Frontend React (Vite dev server) ─────────────────────
  # En dev local : on cible le stage "builder" du Dockerfile multi-stage
  # et on override la command pour lancer Vite en mode hot-reload.
  # En CI/prod : pas de target → build complet (nginx servant dist/).
  frontend:
    build:
      context: ./skillhub-front
      dockerfile: Dockerfile
      target: builder
    container_name: skillhub_front
    restart: unless-stopped
    depends_on:
      skillhub-back:
        condition: service_healthy
    ports:
      - "5173:5173"
    networks:
      - skillhub-net
    # Override : lance Vite dev plutôt que nginx (utile en local pour le HMR).
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5173 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.4"

# ─── Réseau interne isolé pour la communication inter-services
networks:
  skillhub-net:
    driver: bridge

# ─── Volumes nommés pour la persistance des données
volumes:
  skillhub_mysql_data:
  skillhub_mongo_data:
