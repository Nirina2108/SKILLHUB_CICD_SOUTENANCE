# Base de donnees H2 en memoire pour les tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Master Key pour les tests
app.security.smk=moustass2024key!

# Cle secrete JWT pour les tests
app.jwt.secret=moustass2024jwtsecretkeylongenough32chars

# Duree du JWT en millisecondes (15 minutes)
app.jwt.expiration=900000

# URL de base pour les tests
app.base.url=http://localhost:8000

# Desactive completement l email pendant les tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration