# ============================================================
# Nginx — configuration pour SPA React (build production)
# ============================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip pour les assets texte (économise bande passante).
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache long pour les fichiers hashés générés par Vite (assets/...).
    # Vite génère des noms de fichiers hashés donc on peut cacher 1 an.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Pas de cache pour les images publiques (peuvent changer sans hash).
    location /images/ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback : toute URL non trouvée renvoie index.html
    # pour que React Router prenne le relais côté client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Headers de sécurité de base.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
