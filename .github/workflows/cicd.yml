name: SkillHub CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Spring Boot (Auth Server)
  # ─────────────────────────────────────────
  springboot:
    name: SpringBoot — Build, Tests & Sonar
    runs-on: ubuntu-latest

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    defaults:
      run:
        working-directory: springboot

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Droits mvnw
        run: chmod +x mvnw

      - name: Build + Tests Maven
        run: ./mvnw clean verify

      - name: Analyse SonarCloud
        if: env.SONAR_TOKEN != ''
        run: ./mvnw sonar:sonar -Dsonar.token=$SONAR_TOKEN

  # ─────────────────────────────────────────
  # JOB 2 — Laravel (Backend PHP)
  # ─────────────────────────────────────────
  laravel:
    name: Laravel — Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: skillhub-back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PHP + ext-mongodb 2.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, pdo, pdo_mysql, xml, zip, mongodb-2.2.0   # ✅ fix version
          coverage: xdebug

      - name: Install dépendances Composer
        run: composer install --no-progress --prefer-dist

      - name: Copie .env
        run: cp .env.example .env

      - name: Generate App Key
        run: php artisan key:generate

      - name: Run tests Laravel
        run: php artisan test

  # ─────────────────────────────────────────
  # JOB 3 — React (Frontend)
  # ─────────────────────────────────────────
  frontend:
    name: React — Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: skillhub-front

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: skillhub-front/package-lock.json

      - name: Install dépendances npm
        run: npm ci

      - name: Run tests React
        run: npm test

  # ─────────────────────────────────────────
  # JOB 4 — Docker (après tous les tests)
  # ─────────────────────────────────────────
  docker:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: [springboot, laravel, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push skillhub-back
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/skillhub-back:latest ./skillhub-back
          docker push ${{ secrets.DOCKER_USERNAME }}/skillhub-back:latest

      - name: Build & Push skillhub-front
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/skillhub-front:latest ./skillhub-front
          docker push ${{ secrets.DOCKER_USERNAME }}/skillhub-front:latest

      - name: Build & Push skillhub-springboot
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/skillhub-springboot:latest ./springboot
          docker push ${{ secrets.DOCKER_USERNAME }}/skillhub-springboot:latest